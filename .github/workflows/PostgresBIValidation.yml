name: PostgreSQL BI Validation

on:
  push:
    branches:
      - main
      - v1.5-variegata
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-bi-validation:
    name: Regenerate SF1 query results with PostgreSQL
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16.14-bookworm
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out extension
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out pinned LDBC BI queries
        uses: actions/checkout@v4
        with:
          repository: ldbc/ldbc_snb_bi
          ref: 47dd38b40844ecdb0e42e5a610c369535304786d
          path: .cache/ldbc_snb_bi

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ccache ninja-build postgresql-client

      - name: Cache compiler output
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: postgres-bi-${{ runner.os }}-${{ hashFiles('src/**', 'CMakeLists.txt', 'extension_config.cmake', 'duckdb/CMakeLists.txt') }}
          restore-keys: |
            postgres-bi-${{ runner.os }}-

      - name: Build release extension
        run: GEN=ninja make release

      - name: Create C-collated PostgreSQL database
        env:
          PGPASSWORD: postgres
        run: |
          dropdb \
            --host localhost \
            --username postgres \
            --if-exists \
            ldbc_bi_validation
          createdb \
            --host localhost \
            --username postgres \
            --template template0 \
            --lc-collate C \
            --lc-ctype C \
            ldbc_bi_validation

      - name: Generate SF1 data
        run: |
          ./build/release/duckdb -c "
            CALL ldbcgen(
              sf := 1,
              target := 'files',
              format := 'parquet',
              output_dir := '.cache/bi-validation/generated-sf1',
              overwrite := true
            );
          "

      - name: Load generated data into PostgreSQL
        env:
          PGPASSWORD: postgres
        run: |
          python3 tools/postgres_bi_loader.py \
            --dsn postgresql://postgres@localhost:5432/ldbc_bi_validation \
            --schema ldbc_bi_sf1 \
            --snapshot .cache/bi-validation/generated-sf1/graphs/parquet/bi/composite-merged-fk/initial_snapshot \
            --format parquet

      - name: Regenerate and compare all BI query results
        env:
          PGPASSWORD: postgres
        run: |
          python3 tools/bi_query_results.py postgres \
            --dsn postgresql://postgres@localhost:5432/ldbc_bi_validation \
            --schema ldbc_bi_sf1 \
            --queries .cache/ldbc_snb_bi/umbra/queries \
            --fixture test/fixtures/ldbc_snb_bi_sf1_results.json \
            --output postgres-sf1-results.json
          python3 tools/bi_query_results.py compare \
            --expected test/fixtures/ldbc_snb_bi_sf1_results.json \
            --actual postgres-sf1-results.json

      - name: Upload regenerated PostgreSQL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-sf1-results
          path: postgres-sf1-results.json
          if-no-files-found: ignore
